{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>⚙️ Set Category Limit</h2>

    {% if message %}
        <p style="background: rgba(0, 255, 136, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid #00ff88; color: #00ff88;">
            <b>✅ {{ message }}</b>
        </p>
    {% endif %}

    <form method="POST">
        <div>
            <label for="category">🏷️ Category</label>
            <input type="text" name="category" id="category" placeholder="e.g., Food, Travel, Entertainment" required>
        </div>

        <div>
            <label for="limit">💵 Limit Amount</label>
            <input type="number" step="0.01" name="limit" id="limit" placeholder="0.00" required>
        </div>

        <button type="submit">💾 Save Limit</button>
        <a href="/" class="cancel-btn">🔙 Cancel</a>
    </form>

    <br><br>
    <div style="text-align: center;">
        <a href="/" class="back-link">🏠 Back to Home</a>
    </div>
</div>
{% endblock %}
