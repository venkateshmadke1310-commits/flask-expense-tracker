{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>➕ Add Expense</h2>
    {% if error %}
        <p style="color:#ff3333; background: rgba(255, 51, 51, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid #ff3333;">
            <b>⚠️ {{ error }}</b>
        </p>
    {% endif %}

    <form method="POST">
        <div>
            <label for="date">📅 Date:</label>
            <input type="date" name="date" id="date" required>
        </div>

        <div>
            <label for="amount">💰 Amount:</label>
            <input type="number" step="0.01" name="amount" id="amount" placeholder="0.00" required>
        </div>

        <div>
            <label for="category">🏷️ Category:</label>
            <input type="text" name="category" id="category" placeholder="e.g., Food, Travel, Shopping" required>
        </div>

        <div>
            <label for="description">📝 Description:</label>
            <input type="text" name="description" id="description" placeholder="What was this expense for?">
        </div>

        <button type="submit">✅ Add Expense</button>
        <a href="/" class="cancel-btn">🔙 Back</a>
    </form>
</div>
{% endblock %}
