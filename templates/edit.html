{% extends "base.html" %}

{% block content %}
<div class="page-container">

    <h2>✏️ Edit Expense</h2>
    {% if error %}
        <p style="color:#ff3333; background: rgba(255, 51, 51, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid #ff3333;">
            <b>⚠️ {{ error }}</b>
        </p>
    {% endif %}

    <form method="POST" class="form-box">

        <div>
            <label for="date">📅 Date</label>
            <input type="date" name="date" id="date" value="{{ expense.date }}" required>
        </div>

        <div>
            <label for="amount">💰 Amount</label>
            <input type="number" step="0.01" name="amount" id="amount" value="{{ expense.amount }}" required>
        </div>

        <div>
            <label for="category">🏷️ Category</label>
            <input type="text" name="category" id="category" value="{{ expense.category }}" required>
        </div>

        <div>
            <label for="description">📝 Description</label>
            <input type="text" name="description" id="description" value="{{ expense.description }}">
        </div>

        <button type="submit">💾 Update Expense</button>
        <a href="/" class="cancel-btn">❌ Cancel</a>

    </form>

</div>
{% endblock %}
